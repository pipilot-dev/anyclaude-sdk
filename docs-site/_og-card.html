<!DOCTYPE html>
<html><head><meta charset="UTF-8"/><style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1200px; height:630px; overflow:hidden; }
  body {
    background: radial-gradient(1200px 600px at 80% -10%, rgba(124,131,255,.18), transparent 60%),
                radial-gradient(900px 500px at 0% 110%, rgba(77,208,225,.16), transparent 55%), #0b0e14;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color:#e7eaf0; padding:84px 90px; position:relative;
  }
  .dot { width:26px; height:26px; border-radius:7px;
    background:linear-gradient(120deg,#4dd0e1,#7c83ff); display:inline-block; vertical-align:-4px; margin-right:16px; }
  .brand { font-size:30px; font-weight:600; letter-spacing:-.01em; color:#aeb6c4; font-family:"SFMono-Regular",ui-monospace,Menlo,monospace; }
  h1 { font-size:78px; line-height:1.04; letter-spacing:-.03em; margin:46px 0 26px; font-weight:800;
    background:linear-gradient(115deg,#fff 28%,#4dd0e1 72%,#7c83ff); -webkit-background-clip:text; background-clip:text; color:transparent; max-width:1000px; }
  p { font-size:33px; line-height:1.4; color:#aeb6c4; max-width:980px; }
  .row { position:absolute; bottom:80px; left:90px; display:flex; gap:14px; }
  .chip { font-family:"SFMono-Regular",ui-monospace,Menlo,monospace; font-size:22px; color:#4dd0e1;
    border:1.5px solid rgba(77,208,225,.45); background:rgba(77,208,225,.08); padding:9px 20px; border-radius:999px; }
  .url { position:absolute; top:90px; right:90px; font-family:ui-monospace,monospace; font-size:24px; color:#7c83ff; }
</style></head>
<body>
  <div class="brand"><span class="dot"></span>anyclaude-sdk</div>
  <h1>Claude Code agents for any LLM</h1>
  <p>Tools, tool loop, MCP, sub-agents, multi-agent teams &amp; sessions — in the browser, Node &amp; Bun. No backend required.</p>
  <div class="row">
    <span class="chip">browser · node · bun</span>
    <span class="chip">OpenAI / Anthropic compatible</span>
    <span class="chip">MIT</span>
  </div>
  <div class="url">anyclaude-docs.puter.site</div>
</body></html>
