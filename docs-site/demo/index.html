    <script>
      // WebContainer needs cross-origin isolation. coi-serviceworker supplies the
      // headers, but they only take effect on a navigation that passes through the
      // SW — so on the first visit, reload once (after the SW is ready) to gain it.
      (function () {
        if (window.crossOriginIsolated) { sessionStorage.removeItem('coiReloaded'); return }
        if (!navigator.serviceWorker || sessionStorage.getItem('coiReloaded')) return
        sessionStorage.setItem('coiReloaded', '1')
        navigator.serviceWorker.ready.then(function () { window.location.reload() })
      })()
    </script>
